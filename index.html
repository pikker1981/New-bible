<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="description" content="마태복음 현대어 번역 웹앱" />
  <title>마태복음 · 현대어 번역</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css">
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="app-shell">
    <aside class="sidebar" aria-label="마태복음 탐색 메뉴">
      <div class="accent-bar"></div>
      <div class="brand-block">
        <div class="kicker"><span class="kicker-line"></span><span>GOSPEL READER · 01</span></div>
        <h1>마태<br>복음<span>.</span></h1>
        <p>직역형 현대어와 문학적 현대어를 섞은 쉬운 한국어 번역</p>
      </div>

      <div class="stat-row" aria-label="문서 통계">
        <div class="stat"><strong id="statChapters">28</strong><span>CHAPTERS</span></div>
        <div class="stat"><strong id="statVerses">0</strong><span>VERSES</span></div>
        <div class="stat"><strong id="statNotes">0</strong><span>NOTES</span></div>
      </div>

      <div class="control-section">
        <label class="search-label" for="searchInput">SEARCH</label>
        <input id="searchInput" class="search-input" type="search" placeholder="예: 하늘나라, 베드로, 갈릴리" autocomplete="off" />
      </div>

      <nav class="chapter-nav" id="chapterNav" aria-label="장 바로가기"></nav>

      <div class="footer-card">
        <span>MATTHEW SERIES</span>
        <strong>KO·NT</strong>
      </div>
    </aside>

    <main class="reader">
      <header class="reader-hero">
        <div>
          <div class="kicker"><span class="kicker-line"></span><span>한국어 번역 본문</span></div>
          <h2 id="readerTitle">마태복음</h2>
          <p id="readerDesc">본문의 인명·지명·용어 표시는 클릭하면 간단 설명을 볼 수 있습니다.</p>
        </div>
        <div class="reader-actions">
          <button class="btn" id="prevChapter" type="button">이전 장</button>
          <button class="btn primary" id="nextChapter" type="button">다음 장</button>
        </div>
      </header>

      <section class="quote-section" id="featuredVerse" aria-label="대표 구절"></section>
      <section class="verse-list" id="verseList" aria-live="polite"></section>
    </main>

    <aside class="note-panel" aria-label="설명 패널">
      <div class="accent-bar"></div>
      <div class="note-panel-head">
        <div class="kicker"><span class="kicker-line"></span><span>NOTES</span></div>
        <h3>간단 설명</h3>
        <p>인명, 지명, 시대 용어를 짧게 확인합니다.</p>
      </div>
      <div id="noteContent" class="note-content empty">본문의 붉은 표시를 누르면 설명이 여기에 표시됩니다.</div>
      <div class="note-list" id="noteList"></div>
    </aside>
  </div>

  <script src="app.js"></script>
</body>
</html>
